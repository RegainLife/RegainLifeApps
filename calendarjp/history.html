<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CalendarJP - 更新履歴</title>
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a2e;
      --fg: #dbe6ff;
      --muted: #99a8c6;
      --line: #283555;
      --accent: #ff4d6a;
      --accent-hover: #cc2d48;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }
    .breadcrumb {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .breadcrumb a:hover { text-decoration: underline; }
    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: 0.2px; }
    .sub { margin-top: 10px; color: var(--muted); font-size: 14px; }
    .actions { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .actions a {
      text-decoration: none;
      color: #1a0005;
      background: var(--accent);
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 600;
      font-size: 13px;
    }
    .actions a:hover { background: var(--accent-hover); color: #fff; }
    .timeline { margin-top: 18px; }
    .entry {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .entry-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }
    .entry-header:hover { background: #162040; }
    .entry-arrow { flex: 0 0 auto; font-size: 12px; color: var(--muted); transition: transform 0.18s ease; }
    .entry.open .entry-arrow { transform: rotate(90deg); }
    .entry-version { font-weight: 700; font-size: 15px; min-width: 70px; }
    .entry-date { color: var(--muted); font-size: 13px; min-width: 90px; }
    .entry-summary {
      color: var(--muted); font-size: 13px; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .entry-body {
      display: none;
      padding: 0 18px 16px;
      line-height: 1.7;
      font-size: 14px;
      border-top: 1px solid var(--line);
    }
    .entry.open .entry-body { display: block; }
    .entry-body h1, .entry-body h2, .entry-body h3 {
      line-height: 1.35; margin-top: 1em; margin-bottom: 0.4em;
    }
    .entry-body h1 { font-size: 22px; }
    .entry-body h2 { font-size: 18px; }
    .entry-body h3 { font-size: 15px; }
    .entry-body p, .entry-body ul, .entry-body ol { margin: 0.5em 0; }
    .entry-body code {
      font-family: Consolas, monospace;
      background: #16264f; padding: 1px 5px; border-radius: 4px; font-size: 0.92em;
    }
    .entry-body pre {
      overflow-x: auto; background: #0f172a; color: #e2e8f0;
      border-radius: 10px; padding: 12px;
    }
    .entry-body pre code { background: transparent; color: inherit; padding: 0; }
    .entry-loading { color: var(--muted); font-size: 13px; padding-top: 12px; }
    .muted { color: var(--muted); font-size: 14px; }
    @media (max-width: 720px) {
      .entry-summary { display: none; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="breadcrumb"><a href="../">RegainLife Apps</a> &rsaquo; <a href="./">CalendarJP</a> &rsaquo; 更新履歴</p>

    <section class="hero">
      <h1>更新履歴</h1>
      <p class="sub">CalendarJP の全バージョンのリリースノートを確認できます。</p>
      <div class="actions">
        <a href="./">リリース一覧へ戻る</a>
      </div>
    </section>

    <div class="timeline" id="timeline">
      <p class="muted">読み込み中...</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script>
    const timeline = document.getElementById('timeline');
    const loadedContent = {};

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadNoteContent(entry, bodyEl) {
      if (loadedContent[entry.file]) { bodyEl.innerHTML = loadedContent[entry.file]; return; }
      bodyEl.innerHTML = '<p class="entry-loading">読み込み中...</p>';
      try {
        const resp = await fetch(entry.file, { cache: 'no-store' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const md = await resp.text();
        marked.setOptions({ gfm: true, breaks: true, mangle: false, headerIds: false });
        const html = DOMPurify.sanitize(marked.parse(md));
        loadedContent[entry.file] = html;
        bodyEl.innerHTML = html;
      } catch (err) {
        bodyEl.innerHTML = '<p class="muted">リリースノートの取得に失敗しました: ' + escapeHtml(err) + '</p>';
      }
    }

    async function init() {
      try {
        const resp = await fetch('./notes-index.json', { cache: 'no-store' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const list = await resp.json();
        if (!Array.isArray(list) || list.length === 0) {
          timeline.innerHTML = '<p class="muted">更新履歴がありません。</p>';
          return;
        }
        timeline.innerHTML = '';
        for (const entry of list) {
          const el = document.createElement('div');
          el.className = 'entry';
          el.innerHTML = `
            <div class="entry-header">
              <span class="entry-arrow">&#9654;</span>
              <span class="entry-version">${escapeHtml(entry.version)}</span>
              <span class="entry-date">${escapeHtml(entry.date || '')}</span>
              <span class="entry-summary">${escapeHtml(entry.summary || '')}</span>
            </div>
            <div class="entry-body"></div>
          `;
          const header = el.querySelector('.entry-header');
          const body = el.querySelector('.entry-body');
          header.addEventListener('click', () => {
            const isOpen = el.classList.toggle('open');
            if (isOpen) loadNoteContent(entry, body);
          });
          timeline.appendChild(el);
        }
      } catch (err) {
        timeline.innerHTML = '<p class="muted">更新履歴の読み込みに失敗しました: ' + escapeHtml(err) + '</p>';
      }
    }

    init();
  </script>
</body>
</html>
